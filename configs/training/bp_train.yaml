### Model
model_name_or_path: dnotitia/Qwen3-4B-Instruct-2507
trust_remote_code: true

### Training Method
stage: sft
do_train: true
finetuning_type: lora

### LoRA
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: all

### Dataset
dataset: bp_translation
template: qwen3
cutoff_len: 512
val_size: 0.05

### Thinking Mode — CRITICAL for Qwen3
enable_thinking: false

### Training
learning_rate: 1.0e-5
num_train_epochs: 3.0
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
lr_scheduler_type: cosine
warmup_ratio: 0.1
weight_decay: 0.01

### Precision
bf16: true
pure_bf16: true

### Eval & Save
eval_strategy: steps
eval_steps: 100
save_strategy: steps
save_steps: 100
save_total_limit: 3
load_best_model_at_end: true

### Output
output_dir: outputs/bp_qwen3_lora
logging_steps: 1
plot_loss: true