### Model
model_name_or_path: google/translategemma-4b-it
trust_remote_code: true

### Training Method
stage: sft
do_train: true
finetuning_type: lora

### LoRA
lora_rank: 32
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,v_proj,gate_proj,down_proj

### Dataset
dataset: bp_translation_nosystem
template: gemma3
cutoff_len: 128
val_size: 0.05

### Training
learning_rate: 1.0e-5
num_train_epochs: 3.0
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
flash_attn: fa2
lr_scheduler_type: cosine
warmup_ratio: 0.1
weight_decay: 0.01
gradient_checkpointing: false
dataloader_num_workers: 0
max_grad_norm: 1.0

### Precision
bf16: true

### Eval & Save
eval_strategy: steps
eval_steps: 100
save_strategy: steps
save_steps: 100
save_total_limit: 3
load_best_model_at_end: true

### Output
output_dir: outputs/translategemma_lora
logging_steps: 1
plot_loss: true